<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MilkRust Browser Smoke</title>
    <style>
      html,
      body {
        background: #101417;
        color: #dce8e1;
        font: 14px system-ui, sans-serif;
        height: 100%;
        margin: 0;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      canvas {
        background: #050708;
        border: 1px solid #31423c;
        height: min(60vh, 540px);
        width: min(100%, 960px);
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="milkrust" width="960" height="540"></canvas>
      <output id="status">Build milkrust-wasm with wasm-bindgen and serve the generated files next to this page.</output>
    </main>
    <script type="module">
      const status = document.getElementById('status');
      try {
        const wasm = await import('/milkrust_wasm.js');
        await wasm.default({ module_or_path: '/milkrust_wasm_bg.wasm' });
        const canvas = document.getElementById('milkrust');
        const engine = new wasm.MilkRustEngine(canvas);
        engine.resize(canvas.width, canvas.height);
        status.value = engine.rendererLabel();
      } catch (error) {
        status.value = error?.message || String(error);
      }
    </script>
  </body>
</html>
