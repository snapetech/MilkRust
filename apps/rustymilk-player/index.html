<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MilkRust Player</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="player-shell">
      <canvas id="visualizer" aria-label="MilkRust visualizer"></canvas>
      <section class="control-panel" aria-label="MilkRust player controls">
        <div class="title-row">
          <div>
            <h1>MilkRust Player</h1>
            <p id="status">Idle</p>
          </div>
          <div class="button-row">
            <button id="start-demo" type="button">Start Demo</button>
            <button id="start-mic" type="button">Use Mic</button>
          </div>
        </div>
        <div class="control-grid">
          <label>
            Search
            <input id="preset-search" type="search" placeholder="filter presets...">
          </label>
          <label>
            Playlist
            <select id="playlist-list"></select>
          </label>
          <label>
            Playlist Name
            <input id="playlist-name" type="text" placeholder="active or new playlist">
          </label>
          <label class="file-button">
            Playlist Import
            <input id="playlist-import" type="file" accept=".json,.rmplaylist,application/json" multiple>
          </label>
          <label>
            Library
            <select id="pack-list"></select>
          </label>
          <label>
            Preset
            <select id="preset-list"></select>
          </label>
          <label>
            Automation
            <select id="automation">
              <option value="off">Off</option>
              <option value="timed">Timed</option>
              <option value="beat">Beat</option>
            </select>
          </label>
          <label>
            Interval
            <input id="interval" type="number" min="3" max="300" value="30">
          </label>
          <label>
            Beats
            <input id="beats" type="number" min="1" max="64" value="8">
          </label>
        </div>
        <div class="button-row">
          <button id="save-playlist" type="button">Save Playlist</button>
          <button id="update-playlist" type="button">Update Playlist</button>
          <button id="rename-playlist" type="button">Rename Playlist</button>
          <button id="clear-playlist" type="button">Clear Playlist</button>
          <button id="delete-playlist" type="button">Delete Playlist</button>
          <button id="export-playlists" type="button">Export Playlists</button>
          <button id="toggle-favorite" type="button">♡ Favorite</button>
          <button id="view-all" type="button">View: All</button>
          <button id="prev-history" type="button">History Prev</button>
          <button id="next-history" type="button">History Next</button>
          <button id="previous" type="button">Previous</button>
          <button id="next" type="button">Next</button>
          <button id="random" type="button">Random</button>
          <label class="file-button">
            Import
            <input id="preset-files" type="file" accept=".milk,.milk2,text/plain" multiple>
          </label>
          <label class="file-button">
            Textures
            <input id="texture-files" type="file" accept="image/*" multiple>
          </label>
        </div>
        <pre id="debug"></pre>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
